services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ricoh-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass aoRJay23ZiakmfggESo5ASkYWG52ohk_lg
    networks:
      - ricoh-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "aoRJay23ZiakmfggESo5ASkYWG52ohk_lg", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ricoh-postgres
    environment:
      POSTGRES_DB: ricoh_fleet
      POSTGRES_USER: ricoh_admin
      POSTGRES_PASSWORD: ricoh_secure_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ricoh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ricoh_admin -d ricoh_fleet"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ricoh-backend
    ports:
      - "8000:8000"
      - "8088:8088"
    environment:
      - DATABASE_URL=postgresql://ricoh_admin:ricoh_secure_2024@postgres:5432/ricoh_fleet
      - ENVIRONMENT=development
      - DEMO_MODE=false
      - DEBUG=true
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENCRYPTION_KEY=jcM2RoP9ztYz5Ffg73TeoStDUPtY9CqwHStMheQ3Bn0=
      - SECRET_KEY=MHbJvvYdMZFrzuBsaW6XmjaaiRWJD8f8AUUQecUbP6s
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://192.168.91.131:5173,http://192.168.91.131:8000,http://192.168.91.131,http://192.168.91.34:5173,http://192.168.91.34:8000
      - REDIS_URL=redis://:aoRJay23ZiakmfggESo5ASkYWG52ohk_lg@redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=aoRJay23ZiakmfggESo5ASkYWG52ohk_lg
      - CACHE_TTL_DASHBOARD=300
      - CACHE_TTL_ANALYTICS=3600
      - DOCS_USERNAME=admin
      - DOCS_PASSWORD=ricoh_docs_2026
      - RICOH_ADMIN_PASSWORD=admin
      - AUDIT_USERS=${AUDIT_USERS}
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - ricoh-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000 --reload &
             uvicorn audit_microservice:app --host 0.0.0.0 --port 8088"

  # React Frontend (Production Build)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ricoh-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://192.168.91.131:8000
    networks:
      - ricoh-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  ricoh-network:
    driver: bridge
    name: ricoh-network

volumes:
  postgres_data:
    name: ricoh-postgres-data
  node_modules:
    name: ricoh-node-modules
  backend_logs:
    name: ricoh-backend-logs
