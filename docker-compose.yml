services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ricoh-postgres
    environment:
      POSTGRES_DB: ricoh_fleet
      POSTGRES_USER: ricoh_admin
      POSTGRES_PASSWORD: ricoh_secure_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - ricoh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ricoh_admin -d ricoh_fleet"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Database Admin UI (Adminer)
  adminer:
    image: adminer:latest
    container_name: ricoh-adminer
    ports:
      - "8080:8080"
    networks:
      - ricoh-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      - postgres
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ricoh-backend
    ports:
      - "8000:8000"
    environment:
      # =============================================================================
      # DATABASE CONFIGURATION
      # =============================================================================
      - DATABASE_URL=postgresql://ricoh_admin:ricoh_secure_2024@postgres:5432/ricoh_fleet
      
      # =============================================================================
      # APPLICATION CONFIGURATION
      # =============================================================================
      - ENVIRONMENT=development
      - DEMO_MODE=false
      - DEBUG=true
      - API_HOST=0.0.0.0
      - API_PORT=8000
      
      # =============================================================================
      # SECURITY CONFIGURATION - ENCRYPTION & JWT
      # =============================================================================
      # ENCRYPTION_KEY: Required for encrypting sensitive data in database
      # Generate new key with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - ENCRYPTION_KEY=ynVBzh9ZjawHMoUHu0L9ozXT2j8ebujlVxoNzD91xjE=
      
      # SECRET_KEY: Required for signing JWT tokens (must have sufficient entropy)
      # Generate new key with: python -c "import secrets; print(secrets.token_urlsafe(32))"
      - SECRET_KEY=ricoh-jwt-secret-key-change-in-production-min-32-chars
      
      # =============================================================================
      # SECURITY CONFIGURATION - CORS
      # =============================================================================
      # Comma-separated list of allowed origins
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
      
      # =============================================================================
      # SECURITY CONFIGURATION - CSRF
      # =============================================================================
      # CSRF Protection: Enabled by default in production, disabled in development
      # Uncomment to force enable in development:
      # - ENABLE_CSRF=true
      
      # =============================================================================
      # SECURITY CONFIGURATION - REDIS (OPTIONAL)
      # =============================================================================
      # Redis URL for distributed CSRF token storage and rate limiting
      # Required for multi-instance deployments with load balancers
      # Uncomment if using Redis:
      # - REDIS_URL=redis://redis:6379/0
      
      # =============================================================================
      # RICOH INTEGRATION CONFIGURATION
      # =============================================================================
      # Admin password for Ricoh printer web interface
      # Required when using Ricoh printer integration (no default for security)
      # Set this before using printer provisioning features:
      # - RICOH_ADMIN_PASSWORD=your-secure-password-here
    volumes:
      - ./backend:/app
    networks:
      - ricoh-network
    dns:
      - 11.0.20.10
      - 192.168.91.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend (Development)
  frontend:
    image: node:20-alpine
    container_name: ricoh-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - ricoh-network
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  ricoh-network:
    driver: bridge
    name: ricoh-network

volumes:
  postgres_data:
    name: ricoh-postgres-data
  node_modules:
    name: ricoh-node-modules
