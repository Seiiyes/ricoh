version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ricoh_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ricoh_fleet_prod
      POSTGRES_USER: ricoh_prod_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}  # Definir en .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - ricoh_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ricoh_prod_user -d ricoh_fleet_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ricoh_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}  # Definir en .env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ricoh_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: ricoh_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Application
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      
      # Database
      DATABASE_URL: postgresql://ricoh_prod_user:${DB_PASSWORD}@postgres:5432/ricoh_fleet_prod
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CACHE_TTL_DASHBOARD: 300
      CACHE_TTL_ANALYTICS: 3600
      
      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECRET_KEY: ${SECRET_KEY}
      RICOH_ADMIN_PASSWORD: ${RICOH_ADMIN_PASSWORD}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS}
      
      # Performance
      WORKERS: 4
    ports:
      - "8000:8000"
    networks:
      - ricoh_network
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (opcional pero recomendado)
  nginx:
    image: nginx:alpine
    container_name: ricoh_nginx_prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - ricoh_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ricoh_network:
    driver: bridge
