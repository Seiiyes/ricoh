services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ricoh-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ricoh_fleet}
      POSTGRES_USER: ${POSTGRES_USER:-ricoh_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ricoh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ricoh_admin} -d ${POSTGRES_DB:-ricoh_fleet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    # No exponer puerto 5432 externamente en producción
    # Solo accesible desde la red interna de Docker

  # Redis (for distributed CSRF and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: ricoh-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ricoh-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    # No exponer puerto 6379 externamente

  # FastAPI Backend
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ricoh-backend
    environment:
      # =============================================================================
      # DATABASE CONFIGURATION
      # =============================================================================
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ricoh_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ricoh_fleet}
      
      # =============================================================================
      # APPLICATION CONFIGURATION
      # =============================================================================
      - ENVIRONMENT=production
      - DEMO_MODE=false
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8000
      
      # =============================================================================
      # SECURITY CONFIGURATION - ENCRYPTION & JWT
      # =============================================================================
      # CRITICAL: Generate new keys for production, do NOT use development keys
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SECRET_KEY=${SECRET_KEY}
      
      # =============================================================================
      # SECURITY CONFIGURATION - CORS
      # =============================================================================
      # Set to your actual domain(s)
      - CORS_ORIGINS=${CORS_ORIGINS}
      
      # =============================================================================
      # SECURITY CONFIGURATION - CSRF
      # =============================================================================
      # CSRF is enabled by default in production (ENVIRONMENT=production)
      # No need to set ENABLE_CSRF=true explicitly
      
      # =============================================================================
      # SECURITY CONFIGURATION - REDIS
      # =============================================================================
      # Required for multi-instance deployments
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # =============================================================================
      # SECURITY CONFIGURATION - HTTPS
      # =============================================================================
      - FORCE_HTTPS=true
      
      # =============================================================================
      # RICOH INTEGRATION CONFIGURATION
      # =============================================================================
      - RICOH_ADMIN_PASSWORD=${RICOH_ADMIN_PASSWORD}
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - ricoh-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    # No exponer puerto 8000 externamente, usar Nginx como reverse proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend (Production Build)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ricoh-frontend
    environment:
      - VITE_API_URL=${FRONTEND_API_URL}
    networks:
      - ricoh-network
    restart: always
    # No exponer puerto, servir a través de Nginx

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ricoh-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deployment/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    networks:
      - ricoh-network
    depends_on:
      - backend
      - frontend
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ricoh-network:
    driver: bridge
    name: ricoh-network

volumes:
  postgres_data:
    name: ricoh-postgres-data
  redis_data:
    name: ricoh-redis-data
  backend_logs:
    name: ricoh-backend-logs
  nginx_cache:
    name: ricoh-nginx-cache
  nginx_logs:
    name: ricoh-nginx-logs
